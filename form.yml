cluster: "research"
form:
  - r_provider
  - conda_path
  - pixi_path
  - apptainer_image
  - bih_cpus
  - bih_mem
  - bih_time
  - bih_partition
attributes:
  r_provider:
    widget: "select"
    label: "R environment source"
    help: "R is provided through a conda or pixi environment."
    options:
      - [ "Conda environment", "conda", data-set-conda-path: "~/work/bin/miniforge3/bin:R_4.3.3" ]
      - [ "Pixi environment", "pixi", data-set-pixi-path: "~/work/bin/pixi/R_4.4.0" ]
  conda_path:
    widget: "text_field"
    label: "Path to conda environment"
    help: |
      Enter the full path to your Miniforge3 installation's 'bin' directory,
      then add a colon and the name of your R environment.
      For example: `~/work/bin/miniforge3/bin:R_4.3.3`
    required: false
    value: "~/work/bin/miniforge3/bin:R_4.3.3"
  pixi_path:
    widget: "text_field"
    label: "Path to pixi project directory"
    help: |
      Enter the full path to your pixi project directory (the folder containing pixi.toml).
      For example: `~/work/bin/pixi/R_4.4.0`
    value: "~/work/bin/pixi/R_4.4.0"
  apptainer_image:
    widget: "select"
    label: "RStudio server version"
    value: "4.5.0"
    help: |
      The BIH-CUBI HPC team maintains these RStudio Server images.
      The newest version is usually best, but if anything goes wrong,
      try an older version that matches your R setup.
    options:
      - [ "R 4.5.0", "rocker-rstudio_4.5.0.sif" ]
      - [ "R 4.4.2", "rocker-rstudio_4.4.2.sif" ]
      - [ "R 4.4.1", "rocker-rstudio_4.4.1.sif" ]
  bih_cpus:
    widget: "number_field"
    label: "Number of CPU cores"
    value: 16
    min: 1
    max: 192
    step: 1
    help: |
      Choose how many CPU cores your session should use; the real 
      maximum depends on your partition and current QoS usage.
  bih_mem:
    widget: "number_field"
    label: "Memory (in GB)"
    value: 64
    min: 1
    max: 1000
    help: |
      Choose how much memory (RAM) your session should use; the real 
      maximum depends on your partition and current QoS usage.
  bih_time:
    widget: "text_field"
    label: "Job running time"
    value: "12h"
    required: true
    help: |
      Set the maximum run time for your RStudio session.
      Use 'h' for hours (for example, '12h') or 'd' for days (for example, '3d').
      Maximum allowed is 14 days.
    pattern: "^([0-9]{1,2}h|[1-9]d|1[0-4]d)$"
  bih_partition:
    widget: select
    label: "HPC partition"
    value: "medium"
    help: |
      Select a partition with an appropriate wall time for your work.
      CPU and memory limits vary by partition and active QoS usage.
      Keep requests as small and short as practical to improve cluster fairness!
    options:
      - [ "Standard (8h, up to 32 CPU / 199 GB)", "standard" ]
      - [ "Debug (1h, up to 32 CPU / 199 GB)", "debug" ]
      - [ "Short (4h, up to 32 CPU / 199 GB)", "short" ]
      - [ "Medium (7d, up to 32 CPU / 199 GB)", "medium" ]
      - [ "Long (14d, up to 32 CPU / 199 GB)", "long" ]
      - [ "Critical (7d, up to 32 CPU / 199 GB)", "critical" ]
      - [ "Highmem (14d, up to 64 CPU / 800 GB)", "highmem" ]
      - [ "GPU (14d partition, up to 32 CPU / 199 GB)", "gpu" ]